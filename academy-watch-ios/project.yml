name: AcademyWatch

options:
  bundleIdPrefix: com.theacademywatch
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AcademyWatch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AcademyWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theacademywatch.app
        PRODUCT_NAME: AcademyWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: The Academy Watch
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"

  AcademyWatchTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AcademyWatchTests
    dependencies:
      - target: AcademyWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theacademywatch.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"

schemes:
  AcademyWatch:
    build:
      targets:
        AcademyWatch: all
        AcademyWatchTests: [test]
    test:
      targets:
        - AcademyWatchTests

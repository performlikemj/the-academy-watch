name: CI

on:
  pull_request:
    branches: ['**']

jobs:
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: academy-watch-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: academy-watch-frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: academy-watch-frontend
        run: pnpm lint

      - name: Build
        working-directory: academy-watch-frontend
        run: pnpm build

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check academy-watch-backend

      - name: Run ruff format check
        run: ruff format --check academy-watch-backend
